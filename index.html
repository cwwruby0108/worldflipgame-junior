<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>單字翻牌記憶遊戲</title>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 引入 Babel 來編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .perspective-1000 { perspective: 1000px; }
  </style>
</head>
<body class="bg-indigo-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 替換為圖片中的 Unit 1 與 Unit 2 單字
    const wordDatabase = [
      // ----- Unit 1 -----
      { id: 1, en: 'yet', zh: '還(沒)' },
      { id: 2, en: 'already', zh: '已經' },
      { id: 3, en: 'diet', zh: '節食；飲食' },
      { id: 4, en: 'since', zh: '自從' },
      { id: 5, en: 'photo', zh: '照片' },
      { id: 6, en: 'crazy', zh: '荒唐的；瘋狂的' },
      { id: 7, en: 'as... as possible', zh: '盡可能地...' },
      { id: 8, en: 'slim', zh: '苗條的；微小的' },
      { id: 9, en: 'tip', zh: '訣竅' },
      { id: 10, en: 'type', zh: '類型' },
      { id: 11, en: 'ever', zh: '曾經' },
      { id: 12, en: 'habit', zh: '習慣' },
      { id: 13, en: 'take action', zh: '採取行動' },
      { id: 14, en: 'be all ears', zh: '洗耳恭聽' },
      { id: 15, en: 'at least', zh: '至少' },
      { id: 16, en: 'You got it.', zh: '沒錯。' },
      { id: 17, en: 'choice', zh: '選擇' },
      { id: 18, en: 'gym', zh: '健身房；體育館' },
      { id: 19, en: 'abroad', zh: '到國外' },
      { id: 20, en: 'cheat', zh: '作弊；欺騙' },
      { id: 21, en: 'copy', zh: '抄襲；複製' },
      { id: 22, en: 'race', zh: '速度競賽' },
      { id: 23, en: 'stay in shape', zh: '保持健康' },
      { id: 24, en: 'letter', zh: '信' },
      { id: 25, en: 'teenager', zh: '青少年' },
      { id: 26, en: 'senior high school', zh: '高中' },
      { id: 27, en: 'understand', zh: '瞭解' },
      { id: 28, en: 'drum', zh: '鼓' },
      { id: 29, en: 'joy', zh: '樂趣；喜悅' },
      { id: 30, en: 'pop', zh: '流行音樂' },
      { id: 31, en: 'lately', zh: '最近' },
      { id: 32, en: 'angry', zh: '生氣的' },
      { id: 33, en: 'serious', zh: '嚴重的' },
      { id: 34, en: 'interest', zh: '興趣；使感興趣' },
      { id: 35, en: 'garbage', zh: '垃圾' },
      { id: 36, en: 'unhappy', zh: '不快樂的' },
      { id: 37, en: 'wish', zh: '祝福' },
      { id: 38, en: 'envelope', zh: '信封' },
      { id: 39, en: 'stamp', zh: '郵票' },
      { id: 40, en: 'star', zh: '明星' },
      { id: 41, en: 'call', zh: '稱呼' },
      { id: 42, en: 'talk... into', zh: '說服（某人）做...' },

      // ----- Unit 2 -----
      { id: 43, en: 'actor', zh: '演員' },
      { id: 44, en: 'act', zh: '表演' },
      { id: 45, en: 'touch', zh: '觸動；碰觸' },
      { id: 46, en: 'heart', zh: '心；心臟' },
      { id: 47, en: 'surprise', zh: '(使) 驚訝' },
      { id: 48, en: 'bored', zh: '感到無聊的' },
      { id: 49, en: 'hard-working', zh: '勤奮的' },
      { id: 50, en: 'guess', zh: '猜測' },
      { id: 51, en: 'several', zh: '幾個的' },
      { id: 52, en: 'surprised', zh: '感到驚訝的' },
      { id: 53, en: 'exciting', zh: '令人興奮的；刺激的' },
      { id: 54, en: 'ghost', zh: '鬼' },
      { id: 55, en: 'castle', zh: '城堡' },
      { id: 56, en: 'surprising', zh: '令人驚訝的' },
      { id: 57, en: 'interested', zh: '感興趣的' },
      { id: 58, en: 'boring', zh: '無聊的' },
      { id: 59, en: 'download', zh: '下載' },
      { id: 60, en: 'Internet', zh: '網路' },
      { id: 61, en: 'set', zh: '建立；樹立' },
      { id: 62, en: 'excited', zh: '感到興奮的' },
      { id: 63, en: 'ticket', zh: '票' },
      { id: 64, en: 'online', zh: '在網上；線上的' },
      { id: 65, en: 'proud', zh: '自豪的；驕傲的' },
      { id: 66, en: "I'll pass.", zh: '不用了。' },
      { id: 67, en: 'book', zh: '預訂；預約' },
      { id: 68, en: 'actress', zh: '女演員' },
      { id: 69, en: 'towel', zh: '毛巾' },
      { id: 70, en: 'comb', zh: '梳子；梳理' },
      { id: 71, en: 'bat', zh: '蝙蝠' },
      { id: 72, en: 'lie', zh: '謊言；說謊' },
      { id: 73, en: 'fake', zh: '假的；偽造的' },
      { id: 74, en: 'newspaper', zh: '報紙' },
      { id: 75, en: 'nobody', zh: '無人' },
      { id: 76, en: 'anybody', zh: '任何人' },
      { id: 77, en: 'piece', zh: '(一) 則；片；張' },
      { id: 78, en: 'dig', zh: '挖掘；尋找' },
      { id: 79, en: 'sentence', zh: '句子' },
      { id: 80, en: 'spell', zh: '拼字' },
      { id: 81, en: 'trick', zh: '騙；詭計' },
      { id: 82, en: 'post', zh: '貼文；張貼' },
      { id: 83, en: 'right away', zh: '立刻；馬上' },
      { id: 84, en: 'hit', zh: '點擊數' }
    ];

    function App() {
      const [cards, setCards] = useState([]);
      const [flippedIndices, setFlippedIndices] = useState([]);
      const [matchedIds, setMatchedIds] = useState([]);
      const [attempts, setAttempts] = useState(0);
      const [pairCount, setPairCount] = useState(8); 
      const [isGameWon, setIsGameWon] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [isTimerRunning, setIsTimerRunning] = useState(false);

      // 計時器 Effect
      useEffect(() => {
        let interval;
        if (isTimerRunning) {
          interval = setInterval(() => {
            setTimeElapsed(prev => prev + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [isTimerRunning]);

      // 時間格式化
      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      // 發音功能：使用瀏覽器內建的 Web Speech API
      const speakWord = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); // 停止正在播放的聲音，避免連點時聲音重疊
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US'; // 設定為美式發音
          utterance.rate = 0.9; // 稍微放慢語速，讓學生聽得更清楚
          
          // 如果句子中有 '...' (如 talk... into)，先把它濾掉讓發音更自然
          utterance.text = text.replace(/\.\.\./g, ' '); 
          window.speechSynthesis.speak(utterance);
        }
      };

      const shuffleArray = (array) => {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
      };

      const initializeGame = () => {
        const shuffledDB = shuffleArray(wordDatabase);
        const selectedPairs = shuffledDB.slice(0, pairCount);

        let gameCards = [];
        selectedPairs.forEach(pair => {
          gameCards.push({ uniqueId: `${pair.id}-en`, pairId: pair.id, text: pair.en, type: 'en' });
          gameCards.push({ uniqueId: `${pair.id}-zh`, pairId: pair.id, text: pair.zh, type: 'zh' });
        });

        gameCards = shuffleArray(gameCards);
        setCards(gameCards);
        setFlippedIndices([]);
        setMatchedIds([]);
        setAttempts(0);
        setIsGameWon(false);
        setIsProcessing(false);
        setTimeElapsed(0);
        setIsTimerRunning(false);
      };

      useEffect(() => {
        initializeGame();
      }, [pairCount]);

      const handleCardClick = (index) => {
        if (
          isProcessing ||
          flippedIndices.includes(index) ||
          matchedIds.includes(cards[index].pairId)
        ) {
          return;
        }

        // 開始計時
        if (!isTimerRunning) {
          setIsTimerRunning(true);
        }

        // 如果點擊的是英文卡片，就自動念出單字
        if (cards[index].type === 'en') {
          speakWord(cards[index].text);
        }

        const newFlippedIndices = [...flippedIndices, index];
        setFlippedIndices(newFlippedIndices);

        if (newFlippedIndices.length === 2) {
          setIsProcessing(true);
          setAttempts(prev => prev + 1);

          const firstCard = cards[newFlippedIndices[0]];
          const secondCard = cards[newFlippedIndices[1]];

          if (firstCard.pairId === secondCard.pairId) {
            // 配對成功：如果這是最後一對，先停止計時
            if (matchedIds.length + 1 === pairCount) {
              setIsTimerRunning(false);
            }
            
            // 停留 0.5 秒（500毫秒）後再讓卡片消失
            setTimeout(() => {
              setMatchedIds(prev => {
                const newMatched = [...prev, firstCard.pairId];
                if (newMatched.length === pairCount) {
                  setTimeout(() => setIsGameWon(true), 500);
                }
                return newMatched;
              });
              setFlippedIndices([]);
              setIsProcessing(false);
            }, 500);
          } else {
            // 配對失敗：停留 0.5 秒（500毫秒）後翻回去
            setTimeout(() => {
              setFlippedIndices([]);
              setIsProcessing(false);
            }, 500);
          }
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4 text-gray-800">
          <div className="max-w-4xl w-full">
            
            {/* Header 區塊 */}
            <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
              <div>
                <h1 className="text-3xl font-bold text-indigo-600 mb-2 flex items-center">
                  <svg className="mr-2 text-yellow-500" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                  單字記憶翻翻牌
                </h1>
                <p className="text-gray-500">找出正確的中英文配對！</p>
              </div>
              
              <div className="flex items-center gap-6 mt-4 md:mt-0 text-lg">
                <div className="text-center">
                  <span className="block text-sm text-gray-400 font-semibold uppercase tracking-wider">花費時間</span>
                  <span className="font-bold text-2xl text-blue-500">{formatTime(timeElapsed)}</span>
                </div>
                <div className="text-center">
                  <span className="block text-sm text-gray-400 font-semibold uppercase tracking-wider">翻牌次數</span>
                  <span className="font-bold text-2xl text-indigo-500">{attempts}</span>
                </div>
                <div className="text-center">
                  <span className="block text-sm text-gray-400 font-semibold uppercase tracking-wider">已配對</span>
                  <span className="font-bold text-2xl text-green-500">{matchedIds.length} / {pairCount}</span>
                </div>
              </div>
            </div>

            {/* 控制面板 */}
            <div className="flex flex-wrap gap-4 mb-6 justify-center">
              <button 
                onClick={initializeGame}
                className="flex items-center px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full transition-all shadow-md active:scale-95 font-medium"
              >
                <svg className="mr-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                重新開始
              </button>
              
              <div className="flex items-center bg-white px-4 py-2 rounded-full shadow-sm">
                <svg className="text-gray-400 mr-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <label className="text-sm font-medium mr-2">卡片數量:</label>
                <select 
                  value={pairCount} 
                  onChange={(e) => setPairCount(Number(e.target.value))}
                  className="bg-gray-100 rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-indigo-300 transition-shadow"
                >
                  <option value={6}>12 張 (簡單)</option>
                  <option value={8}>16 張 (適中)</option>
                  <option value={10}>20 張 (挑戰)</option>
                  <option value={12}>24 張 (困難)</option>
                  <option value={16}>32 張 (極難)</option>
                </select>
              </div>
            </div>

            {/* 遊戲區塊 */}
            <div className={`grid gap-2 md:gap-3 mx-auto`} 
                 style={{ 
                   gridTemplateColumns: (pairCount === 12 || pairCount === 16) ? 'repeat(4, 1fr)' : `repeat(auto-fit, minmax(${pairCount > 10 ? '100px' : '120px'}, 1fr))`,
                   maxWidth: (pairCount === 12 || pairCount === 16) ? '600px' : (pairCount > 10 ? '800px' : '600px')
                 }}>
              {cards.map((card, index) => {
                const isFlipped = flippedIndices.includes(index);
                const isMatched = matchedIds.includes(card.pairId);
                
                // 處理片語換行 (透過空白字元分割)
                const textParts = card.text.split(' ');
                
                // 依照卡片數量和文字長度決定字體大小
                const maxWordLen = Math.max(...textParts.map(w => w.length));
                let fontSizeClass = '';
                
                if (pairCount >= 12) { // 24 張或 32 張模式
                  if (maxWordLen > 8) {
                    fontSizeClass = 'text-sm sm:text-base md:text-lg';
                  } else {
                    fontSizeClass = 'text-base sm:text-lg md:text-xl';
                  }
                } else { // 12 張、16 張、20 張模式
                  if (maxWordLen > 8) {
                    fontSizeClass = 'text-base sm:text-xl md:text-2xl';
                  } else {
                    fontSizeClass = 'text-xl sm:text-2xl md:text-3xl';
                  }
                }
                
                return (
                  <div 
                    key={card.uniqueId}
                    onClick={() => handleCardClick(index)}
                    className={`relative w-full aspect-[4/3] md:aspect-square cursor-pointer transition-all duration-300 transform perspective-1000 ${isMatched ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100'}`}
                  >
                    <div 
                      className="w-full h-full relative preserve-3d transition-transform duration-500"
                      style={{ transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}
                    >
                      {/* 卡片背面 */}
                      <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-indigo-400 to-purple-500 rounded-xl shadow-md border-2 border-white/20 flex items-center justify-center hover:shadow-lg transition-shadow">
                      </div>
                      
                      {/* 卡片正面 */}
                      <div 
                        className={`absolute w-full h-full backface-hidden rounded-xl shadow-md border-2 flex flex-col items-center justify-center p-1 sm:p-2 text-center
                          ${card.type === 'en' ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-orange-50 border-orange-200 text-orange-700'}`}
                        style={{ transform: 'rotateY(180deg)' }}
                      >
                        <div className={`w-full ${fontSizeClass} font-bold flex flex-col items-center justify-center leading-tight`}>
                          {textParts.map((part, i) => (
                            <span key={i} className="block w-full truncate whitespace-normal break-words">{part}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 過關畫面 */}
            {isGameWon && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 transition-opacity">
                <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-100 transition-transform">
                  <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg className="text-yellow-500" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                  </div>
                  <h2 className="text-3xl font-extrabold text-gray-800 mb-2">太棒了！</h2>
                  <p className="text-gray-600 mb-6 text-lg">
                    你只用了 <strong className="text-indigo-600 text-2xl">{attempts}</strong> 次<br/>
                    花費了 <strong className="text-indigo-600 text-2xl">{formatTime(timeElapsed)}</strong><br/>
                    就成功配對所有單字！
                  </p>
                  <button 
                    onClick={initializeGame}
                    className="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all active:scale-95"
                  >
                    再來一局
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
